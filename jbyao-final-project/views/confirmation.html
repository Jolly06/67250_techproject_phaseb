    <meta name="description" content="MonoMuse website redesign project">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonoMuse – Confirmation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="../static/script.js" defer></script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>

<body onload="addYear(); loadConfirmation();">
    <div class="container">
        <header class="header">
            <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
        </header>
        <nav class="nav_bar">
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a href="membership.html">Membership</a>
            <a href="buytickets.html">Tickets</a>
            
            <a href="javascript:void(0);" class="icon" onclick="toggleMenu()">☰</a>
        </nav>

        <main class="main">
            <div id="confirm-card">
                <h2 id="confirm-heading">Confirmed!</h2>
                <p id="confirm-message">Your submission has been received.</p>
                <div id="confirm-amount-box">
                    <span id="confirm-label">Total</span>
                    <span id="confirm-amount"></span>
                </div>
                <button id="cta" onclick="window.location.href='../index.html'">Back to Home</button>

        </footer>
    </div>
